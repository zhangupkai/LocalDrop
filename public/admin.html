<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop - 管理员</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-page {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-page header {
            text-align: center;
            margin-bottom: 30px;
        }
        .admin-page header a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .admin-page header a:hover {
            text-decoration: underline;
        }
        .admin-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .admin-card h3 {
            margin-bottom: 16px;
            color: #333;
        }
        .login-form {
            display: flex;
            gap: 10px;
        }
        .login-form input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .login-form button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .login-form button:hover {
            background: #5a6fd6;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: #f8f9ff;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .action-buttons button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        .btn-danger:hover {
            background: #ee5a5a;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .admin-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .admin-message.error {
            background: #fff0f0;
            color: #d63031;
        }
        .admin-message.success {
            background: #f0fff4;
            color: #00b894;
        }
    </style>
</head>
<body>
    <div class="admin-page">
        <header>
            <h1>🛡️ LocalDrop 管理员</h1>
            <a href="/">← 返回主页</a>
        </header>

        <div id="loginCard" class="admin-card">
            <h3>管理员登录</h3>
            <div id="loginMessage"></div>
            <div class="login-form">
                <input type="password" id="adminKeyInput" placeholder="输入管理员密钥">
                <button id="loginBtn">登录</button>
            </div>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="admin-card">
                <h3>📊 系统统计</h3>
                <div id="statsGrid" class="stats-grid"></div>
                <button class="btn-secondary" onclick="loadStats()" style="width:100%;padding:10px;border:none;border-radius:8px;cursor:pointer;">🔄 刷新统计</button>
            </div>

            <div class="admin-card">
                <h3>⚠️ 危险操作</h3>
                <div class="action-buttons">
                    <button class="btn-danger" id="clearMessagesBtn">🗑️ 清空所有消息</button>
                    <button class="btn-danger" id="clearFilesBtn">🗑️ 清空所有文件</button>
                </div>
            </div>

            <div class="admin-card">
                <button class="btn-secondary" id="logoutBtn" style="width:100%;padding:12px;border:none;border-radius:8px;cursor:pointer;">退出管理</button>
            </div>
        </div>
    </div>

    <script>
    const loginCard = document.getElementById('loginCard');
    const adminPanel = document.getElementById('adminPanel');
    const loginMessage = document.getElementById('loginMessage');

    // Check if already logged in
    (async function checkStatus() {
        try {
            const res = await fetch('/api/admin/status');
            const data = await res.json();
            if (data.success && data.data.isAdmin) {
                loginCard.style.display = 'none';
                adminPanel.style.display = 'block';
                loadStats();
            }
        } catch (e) {}
    })();

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const key = document.getElementById('adminKeyInput').value;
        if (!key) return;
        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key })
            });
            const data = await res.json();
            if (data.success) {
                loginCard.style.display = 'none';
                adminPanel.style.display = 'block';
                loadStats();
            } else {
                showMessage(data.message || '登录失败', 'error');
            }
        } catch (e) {
            showMessage('网络错误', 'error');
        }
    });

    // Enter key to login
    document.getElementById('adminKeyInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/admin/logout', { method: 'POST' });
        adminPanel.style.display = 'none';
        loginCard.style.display = 'block';
        document.getElementById('adminKeyInput').value = '';
        loginMessage.innerHTML = '';
    });

    // Load stats
    async function loadStats() {
        try {
            const res = await fetch('/api/admin/stats');
            const data = await res.json();
            if (data.success) {
                const s = data.data;
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-item"><div class="stat-value">${s.messageCount}</div><div class="stat-label">消息数</div></div>
                    <div class="stat-item"><div class="stat-value">${s.fileCount}</div><div class="stat-label">文件数</div></div>
                    <div class="stat-item"><div class="stat-value">${formatBytes(s.totalStorage)}</div><div class="stat-label">存储占用</div></div>
                    <div class="stat-item"><div class="stat-value">${s.userCount}</div><div class="stat-label">用户数</div></div>
                `;
            }
        } catch (e) {}
    }

    // Clear messages
    document.getElementById('clearMessagesBtn').addEventListener('click', async () => {
        if (!confirm('确定要清空所有消息吗？此操作不可恢复！')) return;
        const res = await fetch('/api/messages', { method: 'DELETE' });
        const data = await res.json();
        showMessage(data.success ? '已清空所有消息' : (data.message || '操作失败'), data.success ? 'success' : 'error');
        if (data.success) loadStats();
    });

    // Clear files
    document.getElementById('clearFilesBtn').addEventListener('click', async () => {
        if (!confirm('确定要清空所有文件吗？此操作不可恢复！')) return;
        const res = await fetch('/api/files', { method: 'DELETE' });
        const data = await res.json();
        showMessage(data.success ? '已清空所有文件' : (data.message || '操作失败'), data.success ? 'success' : 'error');
        if (data.success) loadStats();
    });

    function showMessage(text, type) {
        loginMessage.innerHTML = `<div class="admin-message ${type}">${text}</div>`;
        setTimeout(() => { loginMessage.innerHTML = ''; }, 3000);
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    </script>
</body>
</html>
